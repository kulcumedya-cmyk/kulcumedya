<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sosyal Medya Hizmetleri Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .category-card {
            transition: transform 0.2s;
        }
        .category-card:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-8 text-gray-800">Sosyal Medya Hizmetleri</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- 2000 Takipçi Kategorisi -->
            <div class="category-card bg-white p-6 rounded-xl shadow-lg relative border-2 border-indigo-100">
                <!-- Sabit Sarı Etiket -->
                <div class="bg-yellow-500 text-black font-bold text-xs uppercase px-3 py-1 rounded mb-4 inline-block tracking-wider">
                    En Çok Satan - En Popüler - Sınırlı Stok
                </div>
                
                <h2 class="text-xl font-bold text-gray-800">2000 Takipçi Paketi</h2>
                <p class="text-gray-600 mt-2">Profilinizi güçlendirmek için en ideal başlangıç paketi.</p>
                
                <div class="mt-4 flex items-center justify-between">
                    <span class="text-indigo-600 font-semibold text-lg">Kalan Miktar:</span>
                    <span id="stock-count" class="text-2xl font-black text-red-600 bg-red-50 px-3 py-1 rounded">175</span>
                </div>

                <button class="w-full mt-6 bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition">Hemen Satın Al</button>
            </div>

            <!-- Diğer Kategori Örneği -->
            <div class="category-card bg-white p-6 rounded-xl shadow-lg border border-gray-200">
                <h2 class="text-xl font-bold text-gray-800">5000 Takipçi Paketi</h2>
                <p class="text-gray-600 mt-2">Daha geniş bir kitleye ulaşmak isteyenler için.</p>
                <div class="mt-4 flex items-center justify-between">
                    <span class="text-indigo-600 font-semibold text-lg">Kalan Miktar:</span>
                    <span class="text-2xl font-bold text-gray-700">42</span>
                </div>
                <button class="w-full mt-6 bg-gray-800 text-white py-3 rounded-lg font-bold hover:bg-gray-900 transition">Hemen Satın Al</button>
            </div>

        </div>
    </div>

    <script>
        // 150 ile 200 arasında rastgele sayı üretme mantığı
        function updateStock() {
            const min = 150;
            const max = 200;
            const randomStock = Math.floor(Math.random() * (max - min + 1)) + min;
            document.getElementById('stock-count').innerText = randomStock;
        }

        // Sayfayı her 3 saniyede bir güncelle
        setInterval(updateStock, 3000);
    </script>
</body>
</html>
